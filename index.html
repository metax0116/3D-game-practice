<!DOCTYPE html>
<html>
<head>
    <title>バトルドーム！</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; text-align: center; color: white; font-family: sans-serif; }
        canvas { display: block; margin: 0 auto; background: #333; cursor: crosshair; }
    </style>
    <!-- Matter.jsの読み込み -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>
    <h1>バトルドーム！！</h1>
    <p>クリックしてボールを投入！ドラッグで盤面を揺らせ！</p>
    <div id="game-container"></div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint } = Matter;

        const engine = Engine.create();
        const render = Render.create({
            element: document.body,
            engine: engine,
            options: { width: 800, height: 500, wireframes: false, background: '#2c3e50' }
        });

        // 盤面の作成
        const walls = [
            Bodies.rectangle(400, 0, 800, 20, { isStatic: true }),
            Bodies.rectangle(400, 500, 800, 20, { isStatic: true }),
            Bodies.rectangle(0, 250, 20, 500, { isStatic: true }),
            Bodies.rectangle(800, 250, 20, 500, { isStatic: true })
        ];

        // 障害物（ドームの突起）
        const pegs = [
            Bodies.circle(200, 150, 20, { isStatic: true, render: { fillStyle: '#e74c3c' } }),
            Bodies.circle(600, 150, 20, { isStatic: true, render: { fillStyle: '#e74c3c' } }),
            Bodies.circle(400, 300, 30, { isStatic: true, render: { fillStyle: '#f1c40f' } }),
            Bodies.circle(200, 400, 20, { isStatic: true, render: { fillStyle: '#e74c3c' } }),
            Bodies.circle(600, 400, 20, { isStatic: true, render: { fillStyle: '#e74c3c' } })
        ];

        Composite.add(engine.world, [...walls, ...pegs]);

        // マウス操作（盤面を揺らす）
        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, { mouse: mouse });
        Composite.add(engine.world, mouseConstraint);

        // ボール投入
        window.addEventListener('mousedown', () => {
            const ball = Bodies.circle(400, 50, 15, { restitution: 0.9, render: { fillStyle: '#ecf0f1' } });
            Composite.add(engine.world, ball);
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
